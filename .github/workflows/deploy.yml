name: Deploy to Testnet

# Triggers only after CI passes on main.
# This guarantees deployments never happen on a broken build.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  # ── Guard: only deploy if CI passed ────────────────────────
  check-ci:
    name: CI passed?
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed — proceeding with deployment"

  # ── Deploy API (Railway) ────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    needs: check-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api

    environment:
      name: testnet
      url: https://api-testnet.remex.mx

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: packages/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Railway picks up all env vars from the project dashboard.
      # RAILWAY_TOKEN must be set in GitHub secrets.
      # Pre-requisite: run `railway link` locally and commit .railway/ directory,
      # OR set RAILWAY_PROJECT_ID + RAILWAY_SERVICE_ID as secrets.
      - name: Deploy to Railway
        run: railway up --detach --service remex-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Deploy Frontend (Vercel) ────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    needs: check-ci
    runs-on: ubuntu-latest

    environment:
      name: testnet
      url: https://testnet.remex.mx

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      # Pre-requisite: link project once locally with `vercel link` and
      # add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to GitHub secrets.
      # All NEXT_PUBLIC_* env vars must be configured in the Vercel dashboard
      # (Settings → Environment Variables) — Vercel injects them at build time.
      - name: Deploy to Vercel (production)
        run: |
          vercel pull --yes --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: packages/web
