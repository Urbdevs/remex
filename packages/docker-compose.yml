version: "3.9"

# ─────────────────────────────────────────────────────────────
# remex.mx — Local Development Infrastructure
#
# Usage:
#   docker compose up -d          # start in background
#   docker compose down           # stop and remove containers
#   docker compose down -v        # also wipe volumes (clean slate)
#   docker compose logs -f        # tail logs
#
# The API and frontend are run directly with npm (not dockerized)
# so you get hot-reload without rebuilding images.
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 15 ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: remex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     remex
      POSTGRES_PASSWORD: remex_dev_password
      POSTGRES_DB:       remex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remex -d remex"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: remex_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
